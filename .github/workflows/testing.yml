name: Testing Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e-test:
    name: Run End-to-End Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: Incident_Tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Start Server
        working-directory: server
        env:
          Database__PSqlConnectionString: "Host=localhost;Port=5432;Database=Incident_Tracker;Username=postgres;Password=postgres"
          Database__RedisConnectionString: "localhost:6379"
        run: ASPNETCORE_URLS=http://localhost:5285 dotnet run --project Src/Api/ &

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Start React Frontend
        working-directory: client
        run: npm run dev &

      - name: Install wait-on and TestCafe  
        run: npm install -g wait-on testcafe

      - name: Wait for server to start
        run: |
          npx wait-on http://localhost:5173 --timeout 120000 --interval 3000
          npx wait-on http://localhost:5285/health --timeout 120000 --interval 3000

      - name: Run E2E Tests
        run: testcafe chrome:headless src/tests/e2e/**/*.js


  performance-test:
    name: Run Performance Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: Incident_Tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Start Server
        working-directory: server
        env:
          Database__PSqlConnectionString: "Host=localhost;Port=5432;Database=Incident_Tracker;Username=postgres;Password=postgres"
          Database__RedisConnectionString: "localhost:6379"
        run: |
          ASPNETCORE_URLS=http://localhost:5285 dotnet run --project Src/Api/ &
          sleep 10

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Run Performance Tests
        env:
          BASE_URL: http://localhost:5285
        run: k6 run server/Tests/performance/load-test.js