name: ci-server

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'server/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'server/**'

jobs:
  build:
    name: Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore

  test:
    name: Run Tests and Collect Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore

      - name: Run Unit and Integration Tests with Coverage
        run: |
          echo "Running Unit Tests..."
          dotnet test --project ./Tests/Unit/Unit.csproj \
            --configuration Release \
            --coverage \
            --coverage-output ./Unit/Coverage/coverage.cobertura.xml \
            --coverage-output-format cobertura

          echo "Running Integration Tests..."
          dotnet test --project ./Tests/Integration/Integration.csproj \
            --configuration Release \
            --coverage \
            --coverage-output ./Integration/Coverage/coverage.cobertura.xml \
            --coverage-output-format cobertura
      - name: Copy coverage to fixed folder
        run: |
          mkdir -p Coverage/Unit
          mkdir -p Coverage/Integration
          # Copy the Unit test coverage file
          cp $(find ./Tests/Unit/bin/Release/net10.0/TestResults -name "coverage.cobertura.xml") Coverage/Unit/
          # Copy the Integration test coverage file
          cp $(find ./Tests/Integration/bin/Release/net10.0/TestResults -name "coverage.cobertura.xml") Coverage/Integration/
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            ./Coverage/Integration/coverage.cobertura.xml
            ./Coverage/Unit/coverage.cobertura.xml

  report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: Coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report for SonarQube
        run: |
          reportgenerator -reports:"Coverage/**/coverage.cobertura.xml" \
                          -targetdir:CoverageReport \
                          -reporttypes:SonarQube

  sonarqube:
    name: Run SonarQube Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    needs: report

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install SonarScanner
        run: dotnet tool install -g dotnet-sonarscanner

      - name: Start SonarQube Analysis
        run: |
          dotnet sonarscanner begin \
            /k:"IncidentTracker" \
            /d:sonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            /d:sonar.token=${{ secrets.SONAR_TOKEN }} \
            /d:sonar.coverageReportPaths="CoverageReport/SonarQube.xml" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.qualitygate.timeout=300

      - name: Complete SonarQube Analysis
        run: |
          dotnet sonarscanner end /d:sonar.token=${{ secrets.SONAR_TOKEN }}